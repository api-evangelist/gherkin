aid: gherkin
name: Gherkin
description: >-
  Gherkin is a business-readable, domain-specific language created to support
  Behavior-Driven Development (BDD). It lets teams describe software behavior
  in plain text using a structured Given-When-Then syntax that is human-readable
  and machine-parsable. Gherkin is the language used by Cucumber and many other
  BDD tools to define executable specifications and acceptance tests.
